<ul class="menu menu--mobile">
  <li class="menu__trigger">Menu&nbsp;▾</li>
  <li>
    <ul class="menu__dropdown">
      {{ range $.Site.Menus.main }}
        {{ if not .HasChildren }}
          <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      {{ end }}
      {{ if and $.Site.Params.showLanguageSelector (gt (len .AllTranslations) 1) }}
        <hr />
        {{ range .Translations }}
          <li>
            <a href="{{ .Permalink }}" onclick="setLanguage('{{ .Language.Lang }}')">
              {{ .Language.LanguageName }}
            </a>
          </li>
        {{ end }}
      {{ end }}
    </ul>
  </li>
</ul>
